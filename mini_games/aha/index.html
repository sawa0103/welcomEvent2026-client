<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポーションづくり</title>
    <style>
        body {
            /* 背景の色を指定(もし画像が読み込まれなかったら時を想定するため) */
            background-color: #f0f0f0;
            /* 背景画像を指定 良いのがあれば好きなものを使っていいよ！！*/
            background-image: url("./background.png");
            /* 背景画像を覆うように指定 */
            background-size: cover;
            /* 背景画像を中央に配置するように指定 */
            background-position: center;
            /* 背景画像を繰り返さないように指定 */
            background-repeat: no-repeat;
            /* 子要素を画面中央に配置するようにする。 */

            justify-content: center;
            align-items: center;
            /* 要素の大きさを指定する */
            width: 100vw;
            height: 100vh;
            /* はみ出たものを非表示にする (なんか要素が見そえないときはこれをvisiableにすると良いかも)*/
            overflow: hidden;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    </div>

    </div>

    </div>
    <!-- 説明画面 最初は非表示-->
    <div id="instruction-screen" class="screen" style="display: none;">
        <!-- ここにコードを！ -->
<div id="instruction-screen" class="screen" style="display: flex;">
        <div class="card">
            <h2> 薬草を混ぜてポーションを作ろう</h2>
            <div class="moji">
                
                <!-- ゲームは60秒で終わる -->
               

                   <p> <strong><span class="fixed-keys">A / D / G / J / L</span> のキーの中から自分の役割を決めてポーションを作ろう</strong></p>

                     
                
                 <p><strong> 制限時間は 60秒 </strong></p>
            </div>
        </div>
    </div>
    </div>
    

    </div>
    <!-- ゲーム画面 最初は非表示-->
    <div id="countdown">残り時間: 60</div>
    <div id="game-screen" class="screen" style="display: none;">
        <!-- ここにコードを！ -->
        <div id="score">スコア: 0</div>
        <div id="keys">押すキー: </div>
        <div id="potions"></div>
    </div>
</body>

<style>
    /* ここに自分のスタイルを！ */
    #score {
        position: absolute;
        top: 90px;
        left: 33.33%;
        width: 33.33%;
        font-size: 24px;
    }
    #countdown {
        position: absolute;
        top: 20px;
        right: 20px;
        font-size: 28px;
        font-weight: bold;
        color: #ffffff;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        z-index: 999;
    }
    #keys {
        position: absolute;
        /* 画面中央よりやや上に配置 */
        top: 40%;
        left: 33.33%;
        width: 33.33%;
        font-size: 24px;
    }
       
    #keys {
        position: absolute;
        /* 真ん中上に表示 */
        top: 20%;
        left: 50%;
        transform: translateX(-50%);
        width: auto;
        /* 高さは自動調整 */
        height: auto;
        font-size: 48px;
        font-weight: bold;
        display: flex;
        justify-content: center;
        /* ラップしたときは上揃えにして
           5つ目の丸が他と同じ高さになるように */
        align-items: flex-start;
        /* 複数行を上方向に詰める */
        align-content: flex-start;
        flex-wrap: wrap;
    }
    .key-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background-color: lightblue;
        color: black;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        font-size: 36px;
        margin: 5px;
        border: 3px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.16);
        transition: transform 140ms ease, box-shadow 140ms ease, background-color 140ms ease;
    }

    .key-circle.next-key {
        background: linear-gradient(135deg, #ffe07a 0%, #ffb74d 100%);
        border-color: #ff8f00;
        color: #222;
        box-shadow: 0 0 0 4px rgba(255, 167, 38, 0.35), 0 10px 18px rgba(0, 0, 0, 0.25);
        transform: scale(1.1);
        animation: pulseNextKey 0.9s ease-in-out infinite;
    }

    @keyframes pulseNextKey {
        0% { transform: scale(1.1); }
        50% { transform: scale(1.18); }
        100% { transform: scale(1.1); }
    }

    .fixed-keys {
        display: inline-block;
        padding: 0.2em 0.55em;
        margin: 0 0.2em;
        border-radius: 0.45em;
        background: rgba(255, 255, 255, 0.9);
        border: 2px solid rgba(220, 20, 60, 0.35);
        color: #111;
        font-size: 1.2em;
        letter-spacing: 0.08em;
        line-height: 1.35;
        white-space: nowrap;
    }
</style>

<script>
    //各要素のIDを取得して操作をできるようにする。
    const startScreen = document.getElementById("start-screen");
    const instructionScreen = document.getElementById("instruction-screen");
    const gameScreen = document.getElementById("game-screen");
    const scoreDisplay = document.getElementById("score");
    const keysDisplay = document.getElementById("keys");

    let score = 0;
    let currentKeys = [];
    let keyIndex = 0;
    let potionCount = 0;
    let points = 0;
    let gameTimer; // ゲームタイマー用変数
    let countdownInterval; // カウントダウン用インターバル
    let timeLeft = 60; // 残り時間
    const wrongAnswerSound = new Audio('./クイズ不正解1.mp3');
    const successSound = new Audio('./ニュースタイトル表示4.mp3');

    // ランダムな3～4つのキーを生成（表示は最大4つまで）
    function generateKeys() {
        const fixedKeys = ['A', 'G', 'L', 'D', 'J'];
        // 3か4をランダムに選ぶ
        const length = Math.floor(Math.random() * 2) + 3; // 3 or 4
        currentKeys = [];
        let html = '';
        for (let i = 0; i < length; i++) {
            const randomKey = fixedKeys[Math.floor(Math.random() * fixedKeys.length)];
            currentKeys.push(randomKey);
            const keyClass = i === 0 ? 'key-circle next-key' : 'key-circle';
            html += '<div class="' + keyClass + '">' + randomKey + '</div> ';
        }
        keysDisplay.innerHTML = html;
        keyIndex = 0;
    }

    // ポーションを表示
    function updatePotions() {
        const potionsDiv = document.getElementById('potions');
        potionsDiv.innerHTML = '';
        for (let i = 0; i < potionCount; i++) {
            const img = document.createElement('img');
            img.src = './ポーション.png'; // 画像パス
            img.alt = 'ポーション';
            potionsDiv.appendChild(img);
        }
    }

    // キーの表示を更新
    function updateKeysDisplay() {
        let html = '';
        for (let i = keyIndex; i < currentKeys.length; i++) {
            const keyClass = i === keyIndex ? 'key-circle next-key' : 'key-circle';
            html += '<div class="' + keyClass + '">' + currentKeys[i] + '</div> ';
        }
        keysDisplay.innerHTML = html;
    }

    // キーボードイベントハンドラー
    function handleKeyPress(event) {
        const pressedKey = event.key.toUpperCase();
        if (pressedKey === currentKeys[keyIndex]) {
            keyIndex++;
            updateKeysDisplay();
            if (keyIndex === currentKeys.length) {
                score += 2;
                potionCount += 1;
                scoreDisplay.textContent = 'スコア: ' + score;
                updatePotions();
                successSound.currentTime = 0;
                successSound.play().catch(() => {});
                generateKeys();
            }
        } else {
            // 間違ったらリセット
            keyIndex = 0;
            updateKeysDisplay();
            wrongAnswerSound.currentTime = 0;
            wrongAnswerSound.play().catch(() => {});
        }
    }

    //説明文を出すもの(サーバーから呼び出される)
    function instruction() {
        startScreen.style.display = "none";
        instructionScreen.style.display = "flex";
        gameScreen.style.display = "none";



        console.log("[Game] 説明画面を表示");
    }

    //ゲームを開始するもの(サーバーから呼び出される)
    function gameStart() {
        // 画面切り替え
        startScreen.style.display = "none";
        instructionScreen.style.display = "none";
        gameScreen.style.display = "flex";

        // ゲーム初期化
        score = 0;
        potionCount = 0;
        scoreDisplay.textContent = 'スコア: ' + score;
        updatePotions();
        generateKeys();
        document.addEventListener('keydown', handleKeyPress);

        // カウントダウン開始
        timeLeft = 60;
        document.getElementById('countdown').textContent = '残り時間: ' + timeLeft;
        countdownInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown').textContent = '残り時間: ' + timeLeft;
            if (timeLeft <= 0) {
                gameStop();
            }
        }, 1000); // 1秒ごとに更新

        console.log("[Game] ゲーム開始！");
    }
    //ゲームを停止するもの(サーバーから呼び出される)
    function gameStop() {
        // タイマーをクリア
        if (gameTimer) {
            clearTimeout(gameTimer);
            gameTimer = null;
        }

        // カウントダウンをクリア
        if (countdownInterval) {
            clearInterval(countdownInterval);
            countdownInterval = null;
        }

        // ここに得点計算をするコードを！
        document.removeEventListener('keydown', handleKeyPress);
        points = Math.min(score * 10, 100); // スコアごとに10点、最大100点




        //得点を返す 最大100点だよ！ 浮動小数点も対応だよ！
        return Math.min(points, 100);
    }
</script>
