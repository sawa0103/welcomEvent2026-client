<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝箱の鍵開け</title>
    <style>
        body {
            /* 背景の色を指定(もし画像が読み込まれなかったら時を想定するため) */
            background-color: #f0f0f0;
            /* 背景画像を指定 良いのがあれば好きなものを使っていいよ！！*/
            background-image: url("./data/background.png");
            /* 背景画像を覆うように指定 */
            background-size: cover;
            /* 背景画像を中央に配置するように指定 */
            background-position: center;
            /* 背景画像を繰り返さないように指定 */
            background-repeat: no-repeat;
            /* 子要素を画面中央に配置するようにする。 */
            display: flex;
            justify-content: center;
            align-items: center;
            /* 要素の大きさを指定する */
            width: 100vw;
            height: 100vh;
            /* はみ出たものを非表示にする (なんか要素が見えないときはこれをvisiableにすると良いかも)*/
            overflow: hidden;
        }
    </style>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DSEG7+Classic&display=swap" rel="stylesheet">
</head>

<body>
    <!-- 開始画面 最初は表示する-->
    <div id="start-screen" class="screen">
        <!-- ここにコードを！ -->
         <div id="instruction-screen" class="screen" style="display: flex;">
        <div class="card" style="position: relative;">
           
            <h1>目指せ３HIT！！</h1>
            <h2 style="font-size: 1.5em;"> 3桁の数列を解読して、宝箱を開けよう！</h2> 
            </h2>
            <div class="moji">
                
                <!-- ゲームは30秒で終わる -->
               
                
                <div class="score-table">
                    <p style="font-size: 1.5em;"> <strong> HIT</strong>:数字・桁数が当たっているよ！</p>
                    <p style="font-size: 1.5em;"><strong>BLOW</strong>:答えにはふくまれてるよ！</p>
                   
                </div>
                 <p style="font-size: 1.5em;"> 制限時間は <strong>1分</strong> </p>
            </div>
        </div>
    </div>
    
    <!-- 説明画面 最初は非表示-->
     <div id="instruction-screen" class="screen" style="display: none;">
        <div class="card" style="position: relative;">
            <button type="button" onclick="closeInstructionToGame()" aria-label="閉じる" style="position: absolute; top: 0.5em; right: 0.5em; width: 2.25em; height: 2.25em; border: none; border-radius: 50%; background: rgba(0,0,0,0.08); font-size: 1.5em; line-height: 1; cursor: pointer;">×</button>
            <h1>目指せ３HIT！！</h1>
            <h2 style="font-size: 1.5em;"> 3桁の数列を解読して、宝箱を開けよう！</h2> 
            </h2>
            <div class="moji">
                
                <!-- ゲームは30秒で終わる -->
               
                
                <div class="score-table">
                    <p style="font-size: 1.5em;"> <strong> HIT</strong>:数字・桁数が当たっているよ！</p>
                    <p style="font-size: 1.5em;"><strong>BLOW</strong>:答えにはふくまれてるよ！</p>
                   
                </div>
                 <p style="font-size: 1.5em;"> 制限時間は <strong>1分</strong> </p>
            </div>
        </div>
    </div>
        <!-- ここにコードを！ -->
        
    </div>
    
    <div id="timer" style="position: absolute; top: 1em; right: 1em; font-weight:700; font-size:1.25em; color:#ffffff; text-shadow: 0.08em 0.08em 0.2em rgba(0,0,0,0.8); z-index:999;">残り時間：<span style="font-size:1.8em; line-height:1;">60</span></div>

    <!-- ゲーム画面 最初は非表示-->
    <div id="game-screen" class="screen" style="display: none;">
        <!-- Boxes (vertical) and system placed side-by-side -->
        <div style="display: flex; gap: 2.5em; align-items: flex-start; padding: 1.25em; transform: scale(1.1); transform-origin: center center;">
            <div>
                <div class="boxes">
                    <div class="code1"><p>?</p></div>
                    <div class="code2"><p>?</p></div>
                    <div class="code3"><p>?</p></div>
                </div>

                <div class="system">
                    <div class="controls" style="display:flex;align-items:center;gap:0.5em;">
                        <input id="guess-input" placeholder="3桁(重複なし)" maxlength="3" style="width:13.8em;padding:0.9em;font-size:1.3em;" />
                        <button id="guess-btn" style="padding:0.75em 1.05em;font-size:1.3em;">Enter</button>
                    </div>
                    <div id="log" style="margin-top:0.85em; max-height:20.5em; overflow:auto; width:26.5em;"></div>
                    <div id="score" style="margin-top:0.5em;font-weight:700;"></div>
                </div>
            </div>

            <div id="instruction-screen" class="screen" style="display: flex; font-size: 0.85em;">
                
                
                <!-- ゲームは30秒で終わる -->
                <div class="score-table">
                   
                    <p style="font-size: 1.5em;"> <strong>ヒント</strong></p>
                    <p style="font-size: 1.1em;"> <strong> → LOW</strong>:0~4までの数字</p>
                    <p style="font-size: 1.1em;"><strong> → HIGH</strong>:5~9までの数字</p>
                </div>
            </div>
        </div>

        <!-- 成功時のオーバーレイ画像（初期は非表示） -->
        <img id="success-img" src="./data/解除成功.png" alt="解除成功" style="display:none;" />






    </div>
</body>

<style>
    /* ここに自分のスタイルを！ */
</style>

<script>
    //各要素のIDを取得して操作をできるようにする。
    const startScreen = document.getElementById("start-screen");
    const instructionScreen = document.getElementById("instruction-screen");
    const gameScreen = document.getElementById("game-screen");

    const guessInput = () => document.getElementById('guess-input');
    const guessBtn = () => document.getElementById('guess-btn');
    const logEl = () => document.getElementById('log');
    const timerEl = () => document.getElementById('timer');
    const scoreEl = () => document.getElementById('score');

    // 説明画面を表示
    function instruction() {
        startScreen.style.display = "flex";
        instructionScreen.style.display = "flex";
        gameScreen.style.display = "none";
        console.log("[Game] 説明画面を表示");
    }

    function closeInstructionToGame() {
        instructionScreen.style.display = "none";
        startScreen.style.display = "none";
        gameScreen.style.display = "flex";
    }

    // gameStart が呼ばれたらゲームを開始する
    function gameStart() {
        // 画面切り替え
        startScreen.style.display = "none";
        instructionScreen.style.display = "none";
        gameScreen.style.display = "flex";
        // 進行中はリセットせず、未開始/終了後のみ初期化する
        if (!isGameActive) {
            initHitAndBlow();
        }
        console.log("[Game] ゲーム開始！");
    }

    // ゲーム停止時の得点計算
    // 得点 = 30 * HIT数 + 5 * BLOW数（3HIT時は100点）
    // (1HIT=30点、2HIT=60点、3HIT=100点、各BLOW=+5点)
    function gameStop(won) {
        let pts = 0;
        if (lastHits === 3) {
            pts = 100;
        } else {
            pts = 30 * lastHits;
        }
        pts += 5 * lastBlows;
        return Math.max(0, pts);
    }

    // --- Hit & Blow 実装 ---
    let secret = '';
    let attempts = 0;
    let timeLeft = 60;
    let timerId = null;
    let lastHits = 0;
    let lastBlows = 0;
    let isGameActive = false;
    const chestOpenSound = new Audio('./data/宝箱を開ける.mp3');

    function generateSecret() {
        const digits = [];
        while (digits.length < 3) {
            const d = Math.floor(Math.random() * 10).toString();
            if (!digits.includes(d)) digits.push(d);
        }
        return digits.join('');
    }

    function initHitAndBlow() {
        secret = generateSecret();
        attempts = 0;
        timeLeft = 60;
        isGameActive = true;
        if (timerId) clearInterval(timerId);
        if (logEl()) logEl().innerHTML = '';
        if (scoreEl()) scoreEl().textContent = '';
        if (guessInput()) guessInput().value = '';
        if (guessBtn()) guessBtn().disabled = false;
        // show LOW/HI for each secret digit before any input
        displayLowHiAll();
        // attach handler
        if (guessBtn()) guessBtn().onclick = handleGuess;
        if (guessInput()) {
            // Enterで判定できるようにする
            guessInput().onkeydown = function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleGuess();
                }
            };
            // 初期フォーカス
            guessInput().focus();
        }
        updateTimerDisplay();
        startTimer();
    }

    function startTimer() {
        timerId = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerId);
                endGame(false);
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        if (timerEl()) timerEl().innerHTML = '残り時間：<span style="font-size:1.8em; line-height:1;">' + timeLeft + '</span>';
    }

    function handleGuess() {
        const raw = guessInput().value.trim();
        if (!/^[0-9]{3}$/.test(raw)) { alert('3桁の数字を入力してください'); return; }
        if (new Set(raw.split('')).size !== 3) { alert('重複のない3桁にしてください'); return; }
        attempts++;
        const res = calcHitBlow(secret, raw);
        lastHits = res.hits;
        lastBlows = res.blows;
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.textContent = `${raw} — HIT:${res.hits} BLOW:${res.blows}`;
        if (logEl()) {
            // 古い入力が上に来るよう、末尾に追加（新しいものは下）
            logEl().appendChild(entry);
            // 最新を見やすくするために下までスクロール
            logEl().scrollTop = logEl().scrollHeight;
        }
        // Boxes already show LOW/HI based on secret; do not overwrite here.
        if (res.hits === 3) {
            // 成功アニメ表示
            showSuccessAnimation();
            // reveal digits
            const a = document.querySelector('.code1 p'); if (a) a.textContent = secret[0];
            const b = document.querySelector('.code2 p'); if (b) b.textContent = secret[1];
            const c = document.querySelector('.code3 p'); if (c) c.textContent = secret[2];
            endGame(true);
        }
        if (guessInput()) guessInput().value = '';
    }

    // 初期表示: 各桁を LOW/HI で表示する (0-4 => LOW, 5-9 => HI)
    function displayLowHiAll() {
        for (let i = 0; i < 3; i++) {
            const box = document.querySelector(`.code${i + 1} p`);
            if (!box) continue;
            const secChar = secret[i];
            const cat = (Number(secChar) <= 4) ? 'LOW' : 'HI';
            box.textContent = cat;
        }
    }

    function calcHitBlow(secret, guess) {
        let hits = 0, blows = 0;
        for (let i = 0; i < 3; i++) {
            if (guess[i] === secret[i]) hits++;
            else if (secret.includes(guess[i])) blows++;
        }
        return { hits, blows };
    }

    function endGame(won) {
        if (guessBtn()) guessBtn().disabled = true;
        if (timerId) clearInterval(timerId);
        isGameActive = false;
        const pts = gameStop(won);
        if (scoreEl()) scoreEl().textContent = (won ? '正解！ ' : '終了！ ') + '得点: ' + pts.toFixed(1);
    }

    // 成功時に中央で画像をバウンス表示する
    function showSuccessAnimation() {
        const img = document.getElementById('success-img');
        if (!img) return;
        // 再生のためクラスをリセット
        img.classList.remove('show-success');
        chestOpenSound.currentTime = 0;
        chestOpenSound.play().catch(() => {});
        // 表示してアニメーションを再生（アニメ後も表示を維持）
        img.style.display = 'block';
        void img.offsetWidth;
        img.classList.add('show-success');
    }
</script>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
